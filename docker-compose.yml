version: '3.8'

services:
  otserver:
    image: kaldmor-otserver:latest
    container_name: kaldmor-otserver
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '7171:7171'
      - '7172:7172'
    volumes:
      - ./data:/srv/data
      - ./config.lua:/srv/config.lua
    environment:
      - TZ=America/Sao_Paulo
    restart: unless-stopped
    networks:
      - otnetwork

  mysql:
    image: mysql:8.0
    container_name: kaldmor-mysql
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=root`n      - MYSQL_DEFAULT_AUTH=mysql_native_password
      - MYSQL_DATABASE=otserv
      - MYSQL_USER=otserv
      - MYSQL_PASSWORD=otserv
    restart: unless-stopped
    networks:
      - otnetwork

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: kaldmor-phpmyadmin
    ports:
      - '8080:80'
    environment:
      - PMA_HOST=mysql
      - PMA_PORT=3306
      - PMA_USER=root
      - PMA_PASSWORD=root
    depends_on:
      - mysql
    restart: unless-stopped
    networks:
      - otnetwork

networks:
  otnetwork:
    driver: bridge

volumes:
  mysql_data:
