version: '3.8'

services:
  db:
    image: mariadb:10.5
    container_name: kaldmor_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: your_docker_password
      MYSQL_DATABASE: global
    volumes:
      - db_data:/var/lib/mysql
      # Map the database.sql to be automatically imported on first run
      - ./database.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3306:3306"
    command: --net_read_timeout=120 --interactive_timeout=28800 --wait_timeout=28800
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 5s
      timeout: 5s
      retries: 20

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: kaldmor_pma
    restart: always
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: your_docker_password
    ports:
      - "8080:80"
    depends_on:
      - db

  server:
    build: .
    container_name: kaldmor_server
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "7171:7171"
      - "7172:7172"
      - "7173:7173"
    volumes:
      # Mount the data directory so changes apply without rebuild
      - ./data:/server/data
      # Mount the config.lua so changes apply without rebuild
      - ./config.lua:/server/config.lua
    # Optional wait-for-it pattern, using a simple sleep or built-in wait
    # The server might crash if it starts before MariaDB is ready,
    # restart: unless-stopped will re-run it until DB is up.

volumes:
  db_data:
